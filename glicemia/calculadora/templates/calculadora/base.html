{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Glicemia MVP{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'calculadora/styles.css' %}?v=7">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">Control Glicemia - Infusión de Insulina</div>
      <div class="muted">Calculadora de apoyo clínico (no guarda datos)</div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer container muted">
    Herramienta de apoyo para uso interno. No reemplaza el criterio médico ni la historia clínica.
  </footer>
</body>
</html>
