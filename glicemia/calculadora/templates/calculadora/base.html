{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Glicemia MVP{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'calculadora/ui.css' %}">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">Glicemia · MVP</div>
      <div class="muted">Calculadora de apoyo (no guarda datos)</div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer container muted">
    Hecho para uso interno. Versión MVP.
  </footer>
</body>
</html>
